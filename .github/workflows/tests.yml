name: Tests

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check shell syntax
        run: |
          bash -n 04-scripts/caption_video.sh
          bash -n scripts/setup.sh
          bash -n scripts/install.sh

      - name: Check repository hygiene
        run: python scripts/check_repo_hygiene.py

      - name: Run unit tests
        run: python -m unittest discover -s 04-scripts -p "test_*.py"
